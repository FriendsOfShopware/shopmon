apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: shopmon
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      initContainers:
        - name: wait-for-migration
          image: ghcr.io/groundnuty/k8s-wait-for:v2.0
          args:
            - job
            - migrate
      containers:
        - name: api
          image: ghcr.io/friendsofshopware/shopmon/api:preview
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: shopmon-secrets
            - configMapRef:
                name: shopmon-config
          readinessProbe:
            httpGet:
              path: /auth
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: shopmon
  annotations:
    kubernetes.namespace.so/expose: "true"
    kubernetes.namespace.so/exposed-port-3000: "ingress-name=shopmon-api"
spec:
  type: LoadBalancer
  selector:
    app: api
  ports:
    - port: 3000
      targetPort: 3000
