name: Deploy Staging

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  KUBE_API_SERVER: https://mochi.shyim.de:6443
  OIDC_AUDIENCE: https://mochi.shyim.de
  K3S_CA_CERT: ${{ vars.K3S_CA_CERT }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/friendsofshopware/shopmon:staging

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v5

      - name: Authenticate to k3s via OIDC
        run: |
          TOKEN=$(curl -sSf \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$OIDC_AUDIENCE" \
            | jq -r '.value')

          echo "$K3S_CA_CERT" > /tmp/k3s-ca.crt
          export KUBECONFIG=/tmp/kubeconfig
          kubectl config set-cluster mochi \
            --server="$KUBE_API_SERVER" \
            --certificate-authority=/tmp/k3s-ca.crt \
            --embed-certs=true
          kubectl config set-credentials github-oidc --token="$TOKEN"
          kubectl config set-context mochi --cluster=mochi --user=github-oidc
          kubectl config use-context mochi
          echo "KUBECONFIG=/tmp/kubeconfig" >> "$GITHUB_ENV"

      - name: Restart staging deployment
        run: |
          kubectl rollout restart deployment/api -n shopmon-staging
          kubectl rollout status deployment/api -n shopmon-staging --timeout=120s
