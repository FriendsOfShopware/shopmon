name: Lint and Test
on:
  push:
    branches:
      - main
      - feat/go-port
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Mise
        uses: jdx/mise-action@v4

      - name: Install Dependencies
        run: mise run setup

      - name: Run Lint
        run: mise run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Mise
        uses: jdx/mise-action@v4

      - name: Install Dependencies
        run: mise run setup

      - name: Run Go Tests
        run: cd api && go test ./internal/... -count=1 -timeout 120s -coverprofile=coverage.out -covermode=atomic

      - name: Run Frontend Tests
        run: cd frontend && npm run test:coverage

      - name: Upload Coverage to Datadog
        if: ${{ !cancelled() }}
        uses: DataDog/coverage-upload-github-action@v1
        with:
          api_key: ${{ secrets.DD_API_KEY }}
          files: api/coverage.out,frontend/coverage/lcov.info
