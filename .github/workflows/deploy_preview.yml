name: Deploy Preview

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  preview:
    runs-on: nscloud
    if: >-
      github.event.issue.pull_request
      && github.event.comment.body == '/preview'
      && (
        github.event.comment.author_association == 'OWNER'
        || github.event.comment.author_association == 'MEMBER'
        || github.event.comment.author_association == 'COLLABORATOR'
      )
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Install and configure Namespace CLI
        uses: namespacelabs/nscloud-setup@v0

      - name: Configure Namespace powered Buildx
        uses: namespacelabs/nscloud-setup-buildx-action@v0

      - name: Login Registry
        run: nsc docker login

      - name: Build and push (frontend)
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: nscr.io/pnssv1a0ofq1e/shopmon-frontend:pr-${{ github.event.issue.number }}
          platforms: linux/amd64
          file: Dockerfile.frontend

      - name: Build and push (api)
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: nscr.io/pnssv1a0ofq1e/shopmon-api:pr-${{ github.event.issue.number }}
          platforms: linux/amd64
          file: Dockerfile.api

      - name: Set image expiration (24h)
        run: |
          nsc registry update-image-expiration nscr.io/pnssv1a0ofq1e/shopmon-frontend:pr-${{ github.event.issue.number }} --ensure-minimum 24h
          nsc registry update-image-expiration nscr.io/pnssv1a0ofq1e/shopmon-api:pr-${{ github.event.issue.number }} --ensure-minimum 24h

      - name: Create ephemeral Kubernetes cluster
        id: cluster
        uses: namespacelabs/nscloud-cluster-action@v0
        with:
          preview: true
          unique-tag: preview-pr-${{ github.event.issue.number }}

      - name: Deploy manifests
        run: |
          sed -e "s|PREVIEW_TAG|pr-${{ github.event.issue.number }}|g" \
            k8s/preview/manifests.yml | kubectl apply -f -

      - name: Wait for migration
        run: kubectl wait --for=condition=complete job/migrate --timeout=120s

      - name: Wait for fixtures
        run: kubectl wait --for=condition=complete job/fixtures --timeout=120s

      - name: Wait for deployments
        run: |
          kubectl rollout status deployment/db --timeout=120s
          kubectl rollout status deployment/redis --timeout=60s
          kubectl rollout status deployment/api --timeout=120s
          kubectl rollout status deployment/frontend --timeout=60s

      - name: Expose frontend
        id: expose-frontend
        uses: namespacelabs/nscloud-expose-kubernetes-action@v0
        with:
          instance-id: ${{ steps.cluster.outputs.instance-id }}
          namespace: default
          service: frontend
          port: "8080"
          name: frontend
          ingress: "noauth"

      - name: Set FRONTEND_URL and restart API
        run: |
          kubectl set env deployment/api FRONTEND_URL=${{ steps.expose-frontend.outputs.preview-url }}
          kubectl set env deployment/worker FRONTEND_URL=${{ steps.expose-frontend.outputs.preview-url }}
          kubectl rollout status deployment/api --timeout=120s
          kubectl rollout status deployment/worker --timeout=120s

      - name: Comment on PR
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            **Preview environment deployed!**

            | Service | URL |
            |---------|-----|
            | Preview | ${{ steps.expose-frontend.outputs.preview-url }} |
            | Cluster | ${{ steps.cluster.outputs.instance-url }} |

            **Test accounts** (password: `password`)

            | Email | Role |
            |-------|------|
            | `owner@fos.gg` | Organization owner, site admin |
            | `admin@fos.gg` | Organization admin |
            | `member@fos.gg` | Organization member |
            | `regular@fos.gg` | Regular user (no organization) |
