name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  preview:
    runs-on: nscloud
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install and configure Namespace CLI
        uses: namespacelabs/nscloud-setup@v0

      - name: Configure Namespace powered Buildx
        uses: namespacelabs/nscloud-setup-buildx-action@v0

      - name: Login Registry
        run: nsc docker login

      - name: Build and push (frontend)
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: nscr.io/pnssv1a0ofq1e/shopmon-frontend:pr-${{ github.event.pull_request.number }}
          platforms: linux/amd64
          file: Dockerfile.frontend

      - name: Build and push (api)
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: nscr.io/pnssv1a0ofq1e/shopmon-api:pr-${{ github.event.pull_request.number }}
          platforms: linux/amd64
          file: Dockerfile.api

      - name: Set image expiration (24h)
        run: |
          nsc registry update-image-expiration nscr.io/pnssv1a0ofq1e/shopmon-frontend:pr-${{ github.event.pull_request.number }} --ensure-minimum 24h
          nsc registry update-image-expiration nscr.io/pnssv1a0ofq1e/shopmon-api:pr-${{ github.event.pull_request.number }} --ensure-minimum 24h

      - name: Create ephemeral Kubernetes cluster
        id: cluster
        uses: namespacelabs/nscloud-cluster-action@v0
        with:
          preview: true
          unique-tag: preview-pr-${{ github.event.pull_request.number }}

      - name: Deploy manifests
        run: |
          sed -e "s|PREVIEW_TAG|pr-${{ github.event.pull_request.number }}|g" \
            k8s/preview/manifests.yml | kubectl apply -f -

      - name: Wait for migration
        run: kubectl wait --for=condition=complete job/migrate --timeout=120s

      - name: Wait for deployments
        run: |
          kubectl rollout status deployment/db --timeout=120s
          kubectl rollout status deployment/redis --timeout=60s
          kubectl rollout status deployment/api --timeout=120s
          kubectl rollout status deployment/frontend --timeout=60s

      - name: Expose frontend
        id: expose-frontend
        uses: namespacelabs/nscloud-expose-kubernetes-action@v0
        with:
          instance-id: ${{ steps.cluster.outputs.instance-id }}
          namespace: default
          service: frontend
          port: "8080"
          name: frontend
          ingress: "noauth"

      - name: Expose API
        id: expose-api
        uses: namespacelabs/nscloud-expose-kubernetes-action@v0
        with:
          instance-id: ${{ steps.cluster.outputs.instance-id }}
          namespace: default
          service: api
          port: "3000"
          name: api
          ingress: "noauth"

      - name: Comment on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            **Preview environment deployed!**

            | Service | URL |
            |---------|-----|
            | Frontend | ${{ steps.expose-frontend.outputs.preview-url }} |
            | API | ${{ steps.expose-api.outputs.preview-url }} |
            | Cluster | ${{ steps.cluster.outputs.instance-url }} |
