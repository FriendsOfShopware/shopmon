version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      all:
        patterns: ["*"]
    commit-message:
      prefix: "fix(deps)"
    labels:
      - "dependencies"
    ignore:
      # Major bumps blocked by peer deps; revisit when the consumers catch up.
      # zod 4 / typescript 6 / beasties 0.4 / @unhead/vue 3 break
      # @vee-validate/zod, openapi-typescript, vite-ssg respectively.
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "beasties"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "@unhead/vue"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "gomod"
    directory: "/api"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      all:
        patterns: ["*"]
    commit-message:
      prefix: "fix(deps)"
    labels:
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      all:
        patterns: ["*"]
    commit-message:
      prefix: "fix(deps)"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      all:
        patterns: ["*"]
    commit-message:
      prefix: "fix(deps)"
    labels:
      - "dependencies"
