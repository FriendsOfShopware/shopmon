    patch:
      operationId: updateOrganization
      tags: [Organizations]
      summary: Update an organization
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                logo:
                  type: string
      responses:
        "200":
          description: Updated
    delete:
      operationId: deleteOrganization
      tags: [Organizations]
      summary: Delete an organization
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
        "403":
          description: Only owners can delete

