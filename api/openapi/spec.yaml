      operationId: removeMember
      tags: [Organizations]
      summary: Remove a member from the organization
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member removed

