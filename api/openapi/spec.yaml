openapi: 3.0.3
info:
  title: Shopmon API
  description: Shopware monitoring application API
  version: 1.0.0

servers:
  - url: /api
    description: API base path

tags:
  - name: Health
    description: Health check
  - name: Account
    description: Account information and aggregated data
  - name: Notifications
    description: User notifications
  - name: Shops
    description: Shop management and operations
  - name: Projects
    description: Project management
  - name: ApiKeys
    description: API key management
  - name: PackagesToken
    description: Packages token management
  - name: Deployments
    description: Deployment management
  - name: CLI
    description: CLI integration endpoints
  - name: SSO
    description: Single Sign-On provider management
  - name: Admin
    description: Admin-only endpoints
  - name: Info
    description: Public information endpoints
  - name: Auth
    description: Authentication (email/password, OAuth, SSO, passkeys)
  - name: Organizations
    description: Organization management
  - name: AuthAdmin
    description: Admin user management

security:
  - bearerAuth: []

paths:
  # ──────────────────────────────────────────────
  # Health
  # ──────────────────────────────────────────────
  /health:
    get:
      operationId: getHealth
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            text/plain:
              schema:
                type: string
                enum: ["ok"]

  # ──────────────────────────────────────────────
  # Account
  # ──────────────────────────────────────────────
  /account/me:
    get:
      operationId: getAccountMe
      tags: [Account]
      summary: Get current user profile
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /account/extensions:
    get:
      operationId: getAccountExtensions
      tags: [Account]
      summary: Get aggregated extensions across all shops
      responses:
        "200":
          description: List of extensions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountExtension"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /account/organizations:
    get:
      operationId: getAccountOrganizations
      tags: [Account]
      summary: Get organizations the user belongs to
      responses:
        "200":
          description: List of organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountOrganization"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /account/shops:
    get:
      operationId: getAccountShops
      tags: [Account]
      summary: Get all shops accessible to the user
      responses:
        "200":
          description: List of shops
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountShop"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /account/projects:
    get:
      operationId: getAccountProjects
      tags: [Account]
      summary: Get all projects accessible to the user
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountProject"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /account/changelogs:
    get:
      operationId: getAccountChangelogs
      tags: [Account]
      summary: Get changelogs across all shops
      responses:
        "200":
          description: List of changelogs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountChangelog"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /account/subscribed-shops:
    get:
      operationId: getAccountSubscribedShops
      tags: [Account]
      summary: Get shops the user is subscribed to for notifications
      responses:
        "200":
          description: List of subscribed shops
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubscribedShop"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────────
  # Notifications
  # ──────────────────────────────────────────────
  /notifications:
    get:
      operationId: getNotifications
      tags: [Notifications]
      summary: Get all notifications for the current user
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      operationId: deleteAllNotifications
      tags: [Notifications]
      summary: Delete all notifications
      responses:
        "204":
          description: All notifications deleted
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/{id}:
    delete:
      operationId: deleteNotification
      tags: [Notifications]
      summary: Delete a single notification
      parameters:
        - $ref: "#/components/parameters/NotificationId"
      responses:
        "204":
          description: Notification deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /notifications/mark-read:
    post:
      operationId: markNotificationsRead
      tags: [Notifications]
      summary: Mark all notifications as read
      responses:
        "204":
          description: All notifications marked as read
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────────
  # Shops
  # ──────────────────────────────────────────────
  /organizations/{orgId}/shops:
    get:
      operationId: getOrganizationShops
      tags: [Shops]
      summary: Get all shops in an organization
      parameters:
        - $ref: "#/components/parameters/OrgId"
      responses:
        "200":
          description: List of shops
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountShop"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /shops:
    post:
      operationId: createShop
      tags: [Shops]
      summary: Create a new shop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShopRequest"
      responses:
        "201":
          description: Shop created
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /shops/{shopId}:
    get:
      operationId: getShop
      tags: [Shops]
      summary: Get full shop details
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "200":
          description: Shop details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateShop
      tags: [Shops]
      summary: Update a shop
      parameters:
        - $ref: "#/components/parameters/ShopId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShopRequest"
      responses:
        "200":
          description: Shop updated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      operationId: deleteShop
      tags: [Shops]
      summary: Delete a shop
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "204":
          description: Shop deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /shops/{shopId}/refresh:
    post:
      operationId: refreshShop
      tags: [Shops]
      summary: Refresh shop data from Shopware API
      parameters:
        - $ref: "#/components/parameters/ShopId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sitespeed:
                  type: boolean
                  description: Also run sitespeed check
      responses:
        "204":
          description: Shop refresh triggered
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /shops/{shopId}/clear-cache:
    post:
      operationId: clearShopCache
      tags: [Shops]
      summary: Clear Shopware cache for the shop
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "204":
          description: Cache cleared
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /shops/{shopId}/tasks/{taskId}/reschedule:
    post:
      operationId: rescheduleTask
      tags: [Shops]
      summary: Reschedule a scheduled task
      parameters:
        - $ref: "#/components/parameters/ShopId"
        - $ref: "#/components/parameters/TaskId"
      responses:
        "204":
          description: Task rescheduled
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /shops/{shopId}/subscribe:
    get:
      operationId: getShopSubscription
      tags: [Shops]
      summary: Check notification subscription status
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "200":
          description: Subscription status
          content:
            application/json:
              schema:
                type: object
                required:
                  - subscribed
                properties:
                  subscribed:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: subscribeToShop
      tags: [Shops]
      summary: Subscribe to shop notifications
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "204":
          description: Subscribed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    delete:
      operationId: unsubscribeFromShop
      tags: [Shops]
      summary: Unsubscribe from shop notifications
      parameters:
        - $ref: "#/components/parameters/ShopId"
      responses:
        "204":
          description: Unsubscribed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /shops/{shopId}/sitespeed-settings:
    put:
      operationId: updateSitespeedSettings
      tags: [Shops]
      summary: Update sitespeed settings for a shop
      parameters:
        - $ref: "#/components/parameters/ShopId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SitespeedSettingsRequest"
      responses:
        "200":
          description: Sitespeed settings updated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ──────────────────────────────────────────────
  # Projects
  # ──────────────────────────────────────────────
  /organizations/{orgId}/projects:
    get:
      operationId: getOrganizationProjects
      tags: [Projects]
      summary: Get all projects in an organization
      parameters:
        - $ref: "#/components/parameters/OrgId"
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createProject
      tags: [Projects]
      summary: Create a new project
      parameters:
        - $ref: "#/components/parameters/OrgId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /organizations/{orgId}/projects/{projectId}:
    patch:
      operationId: updateProject
      tags: [Projects]
      summary: Update a project
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Project updated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      operationId: deleteProject
      tags: [Projects]
      summary: Delete a project
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "204":
          description: Project deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────
  # API Keys
  # ──────────────────────────────────────────────
  /api-key-scopes:
    get:
      operationId: getApiKeyScopes
      tags: [ApiKeys]
      summary: Get available API key scopes
      security: []
      responses:
        "200":
          description: List of available scopes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKeyScope"

  /organizations/{orgId}/projects/{projectId}/api-keys:
    get:
      operationId: getApiKeys
      tags: [ApiKeys]
      summary: List API keys for a project
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: List of API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKey"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createApiKey
      tags: [ApiKeys]
      summary: Create a new API key
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApiKeyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /organizations/{orgId}/projects/{projectId}/api-keys/{keyId}:
    delete:
      operationId: deleteApiKey
      tags: [ApiKeys]
      summary: Delete an API key
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/KeyId"
      responses:
        "204":
          description: API key deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────
  # Packages Token
  # ──────────────────────────────────────────────
  /packages-token/configuration:
    get:
      operationId: getPackagesTokenConfiguration
      tags: [PackagesToken]
      summary: Get packages token configuration
      responses:
        "200":
          description: Packages token configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackagesTokenConfiguration"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /organizations/{orgId}/projects/{projectId}/packages-tokens:
    get:
      operationId: getPackagesTokens
      tags: [PackagesToken]
      summary: List packages tokens for a project
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: List of packages tokens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PackagesToken"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createPackagesToken
      tags: [PackagesToken]
      summary: Create a new packages token
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePackagesTokenRequest"
      responses:
        "201":
          description: Packages token created
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /organizations/{orgId}/projects/{projectId}/packages-tokens/{tokenId}:
    delete:
      operationId: deletePackagesToken
      tags: [PackagesToken]
      summary: Delete a packages token
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/TokenId"
      responses:
        "204":
          description: Packages token deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /organizations/{orgId}/projects/{projectId}/packages-tokens/{tokenId}/sync:
    post:
      operationId: syncPackagesToken
      tags: [PackagesToken]
      summary: Sync a packages token
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/TokenId"
      responses:
        "204":
          description: Sync triggered
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────
  # Deployments
  # ──────────────────────────────────────────────
  /shops/{shopId}/deployments:
    get:
      operationId: getDeployments
      tags: [Deployments]
      summary: List deployments for a shop
      parameters:
        - $ref: "#/components/parameters/ShopId"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: List of deployments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deployment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /shops/{shopId}/deployments/{deploymentId}:
    get:
      operationId: getDeployment
      tags: [Deployments]
      summary: Get deployment details with output
      parameters:
        - $ref: "#/components/parameters/ShopId"
        - $ref: "#/components/parameters/DeploymentId"
      responses:
        "200":
          description: Deployment details with output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteDeployment
      tags: [Deployments]
      summary: Delete a deployment
      parameters:
        - $ref: "#/components/parameters/ShopId"
        - $ref: "#/components/parameters/DeploymentId"
      responses:
        "204":
          description: Deployment deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────
  # CLI
  # ──────────────────────────────────────────────
  /cli/deployments:
    post:
      operationId: createCliDeployment
      tags: [CLI]
      summary: Create a deployment via CLI
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCliDeploymentRequest"
      responses:
        "201":
          description: Deployment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCliDeploymentResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ──────────────────────────────────────────────
  # SSO
  # ──────────────────────────────────────────────
  /organizations/{orgId}/sso-providers:
    get:
      operationId: getSsoProviders
      tags: [SSO]
      summary: List SSO providers for an organization
      parameters:
        - $ref: "#/components/parameters/OrgId"
      responses:
        "200":
          description: List of SSO providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SsoProvider"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /sso/discover:
    get:
      operationId: discoverSso
      tags: [SSO]
      summary: Discover OIDC configuration from an issuer URL
      parameters:
        - name: issuer
          in: query
          required: true
          schema:
            type: string
            format: uri
      responses:
        "200":
          description: Discovered OIDC configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SsoDiscovery"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /organizations/{orgId}/sso-providers/{providerId}:
    put:
      operationId: updateSsoProvider
      tags: [SSO]
      summary: Update an SSO provider
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/ProviderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSsoProviderRequest"
      responses:
        "200":
          description: SSO provider updated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      operationId: deleteSsoProvider
      tags: [SSO]
      summary: Delete an SSO provider
      parameters:
        - $ref: "#/components/parameters/OrgId"
        - $ref: "#/components/parameters/ProviderId"
      responses:
        "204":
          description: SSO provider deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────────
  # Admin
  # ──────────────────────────────────────────────
  /admin/organizations:
    get:
      operationId: adminGetOrganizations
      tags: [Admin]
