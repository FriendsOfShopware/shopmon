          schema:
            type: string
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    userId:
                      type: string
                    role:
                      type: string
                    name:
                      type: string
                    email:
                      type: string
                    image:
                      type: string
                      nullable: true

