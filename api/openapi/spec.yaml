                    - createdAt
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                      nullable: true
                    deviceType:
                      type: string
                    backedUp:
                      type: boolean
                    createdAt:
                      type: string
                      format: date-time

  /auth/passkey/delete-passkey:
    post:
      operationId: deletePasskey
      tags: [Auth]
      summary: Delete a passkey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
      responses:
        "200":
          description: Passkey deleted

  /auth/sso/register:
    post:
      operationId: registerSSOProvider
      tags: [Auth]
      summary: Register an SSO provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [organizationId, domain, issuer, clientId, clientSecret, authorizationEndpoint, tokenEndpoint, jwksEndpoint]
              properties:
                organizationId:
                  type: string
                domain:
                  type: string
                issuer:
                  type: string
                clientId:
                  type: string
                clientSecret:
                  type: string
                authorizationEndpoint:
                  type: string
                tokenEndpoint:
                  type: string
                jwksEndpoint:
                  type: string
      responses:
        "200":
          description: SSO provider registered

  /auth/admin/stop-impersonating:
    post:
      operationId: adminStopImpersonating
      tags: [AuthAdmin]
      summary: Stop impersonating a user
      responses:
        "200":
          description: Impersonation ended

  /auth/exchange-code:
    post:
      operationId: exchangeCode
      tags: [Auth]
      summary: Exchange one-time authorization code for session token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        "200":
          description: Session token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        "400":
          description: Invalid or expired code

components:
  # ──────────────────────────────────────────────
  # Security Schemes
  # ──────────────────────────────────────────────
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer token authentication

  # ──────────────────────────────────────────────
  # Parameters
  # ──────────────────────────────────────────────
  parameters:
    OrgId:
      name: orgId
      in: path
      required: true
      schema:
        type: string
      description: Organization ID

    ShopId:
      name: shopId
      in: path
      required: true
      schema:
        type: integer
      description: Shop ID

    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: integer
      description: Project ID

    DeploymentId:
      name: deploymentId
      in: path
      required: true
      schema:
        type: integer
      description: Deployment ID

    KeyId:
      name: keyId
      in: path
      required: true
      schema:
        type: integer
      description: API key ID

    TokenId:
      name: tokenId
      in: path
      required: true
      schema:
        type: integer
      description: Packages token ID

    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
      description: Scheduled task ID

    ProviderId:
      name: providerId
      in: path
      required: true
      schema:
        type: string
      description: SSO provider ID

    NotificationId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Notification ID

  # ──────────────────────────────────────────────
  # Responses
  # ──────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  # ──────────────────────────────────────────────
  # Schemas
  # ──────────────────────────────────────────────
  schemas:
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string

    # ── Account ──────────────────────────────────
    UserProfile:
      type: object
      required:
        - id
        - displayName
        - email
        - createdAt
      properties:
        id:
          type: string
        displayName:
          type: string
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time

    AccountExtension:
      type: object
      required:
        - name
        - label
        - version
        - latestVersion
        - active
        - installed
        - storeLink
        - ratingAverage
        - installedAt
        - changelog
        - shops
      properties:
        name:
          type: string
        label:
          type: string
        version:
          type: string
        latestVersion:
          type: string
        active:
          type: boolean
        installed:
          type: boolean
        storeLink:
          type: string
          nullable: true
        ratingAverage:
          type: number
          nullable: true
        installedAt:
          type: string
          nullable: true
          format: date-time
        changelog:
          type: string
          nullable: true
        shops:
          type: array
          items:
            $ref: "#/components/schemas/AccountExtensionShop"

    AccountExtensionShop:
      type: object
      required:
        - shopId
        - shopName
        - shopOrganizationName
        - shopOrganizationId
        - shopUrl
        - active
        - version
        - latestVersion
        - installed
      properties:
        shopId:
          type: integer
        shopName:
          type: string
        shopOrganizationName:
          type: string
        shopOrganizationId:
          type: string
        shopUrl:
          type: string
        active:
          type: boolean
        version:
          type: string
        latestVersion:
          type: string
        installed:
          type: boolean

    AccountOrganization:
      type: object
      required:
        - id
        - name
        - logo
        - createdAt
        - shopCount
        - memberCount
      properties:
        id:
          type: string
        name:
          type: string
        logo:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        shopCount:
          type: integer
        memberCount:
          type: integer

    AccountShop:
      type: object
      required:
        - id
        - name
        - url
        - favicon
        - status
        - shopwareVersion
        - lastScrapedAt
        - lastScrapedError
        - organizationId
        - organizationName
        - projectId
        - projectName
      properties:
        id:
          type: integer
        name:
          type: string
        url:
          type: string
        favicon:
          type: string
          nullable: true
        status:
          type: string
        shopwareVersion:
          type: string
        lastScrapedAt:
          type: string
          nullable: true
          format: date-time
        lastScrapedError:
          type: string
          nullable: true
        organizationId:
          type: string
        organizationName:
          type: string
        projectId:
          type: integer
          nullable: true
        projectName:
          type: string
          nullable: true

    AccountProject:
      type: object
      required:
        - id
        - name
        - description
        - gitUrl
        - organizationId
        - organizationName
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        gitUrl:
          type: string
          nullable: true
        organizationId:
          type: string
        organizationName:
          type: string

    AccountChangelog:
      type: object
      required:
        - id
        - shopId
        - extensions
        - oldShopwareVersion
        - newShopwareVersion
        - date
        - shopName
        - shopOrganizationName
        - shopOrganizationId
      properties:
        id:
          type: integer
        shopId:
          type: integer
        extensions:
          type: array
          description: JSON data describing extension changes
          items:
            $ref: "#/components/schemas/ExtensionDiff"
        oldShopwareVersion:
          type: string
          nullable: true
        newShopwareVersion:
          type: string
          nullable: true
        date:
          type: string
          format: date-time
        shopName:
          type: string
        shopOrganizationName:
          type: string
        shopOrganizationId:
          type: string

    ExtensionDiff:
      type: object
      required:
        - name
        - label
        - state
        - active
      properties:
        name:
          type: string
        label:
          type: string
        state:
          type: string
        oldVersion:
          type: string
          nullable: true
        newVersion:
          type: string
          nullable: true
        changelog:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ExtensionChangelogEntry"
        active:
          type: boolean

    ExtensionChangelogEntry:
      type: object
      required:
        - version
        - text
        - creationDate
        - isCompatible
      properties:
        version:
          type: string
        text:
          type: string
        creationDate:
          type: string
          format: date-time
        isCompatible:
          type: boolean

    SubscribedShop:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
        name:
          type: string

    # ── Notifications ────────────────────────────
    Notification:
      type: object
      required:
        - id
        - userId
        - key
        - level
        - title
        - message
        - link
        - read
        - createdAt
      properties:
        id:
          type: integer
        userId:
          type: string
        key:
          type: string
        level:
          type: string
        title:
          type: string
        message:
          type: string
        link:
          allOf:
            - $ref: "#/components/schemas/NotificationLink"
          nullable: true
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time

    NotificationLink:
      type: object
      required:
        - url
        - label
      properties:
        url:
          type: string
        label:
          type: string

    # ── Shops ────────────────────────────────────
    CreateShopRequest:
      type: object
      required:
        - name
        - shopUrl
        - clientId
        - clientSecret
        - projectId
      properties:
        name:
          type: string
        shopUrl:
          type: string
        clientId:
          type: string
        clientSecret:
          type: string
        projectId:
          type: integer
        shopToken:
          type: string
          nullable: true

    UpdateShopRequest:
      type: object
      required:
        - projectId
      properties:
        name:
          type: string
        shopUrl:
          type: string
        clientId:
          type: string
        clientSecret:
          type: string
        ignores:
          type: array
          items:
            type: string
        projectId:
          type: integer

    ShopDetail:
      type: object
      required:
        - id
        - organizationId
        - organizationName
        - projectId
        - projectName
        - projectDescription
        - name
        - status
        - url
        - favicon
        - shopwareVersion
        - lastScrapedAt
        - lastScrapedError
        - ignores
        - shopImage
        - lastChangelog
        - sitespeedEnabled
        - sitespeedUrls
        - sitespeedDetailUrl
        - createdAt
        - shopToken
        - extensions
        - scheduledTasks
        - queues
        - cache
        - checks
        - sitespeeds
        - changelogs
        - deploymentsCount
      properties:
        id:
          type: integer
        organizationId:
          type: string
        organizationName:
          type: string
        projectId:
          type: integer
          nullable: true
        projectName:
          type: string
          nullable: true
        projectDescription:
          type: string
          nullable: true
        name:
          type: string
        status:
          type: string
        url:
          type: string
        favicon:
          type: string
          nullable: true
        shopwareVersion:
          type: string
        lastScrapedAt:
          type: string
          nullable: true
          format: date-time
        lastScrapedError:
          type: string
          nullable: true
        ignores:
          type: array
          nullable: true
          items:
            type: string
        shopImage:
          type: string
          nullable: true
        shopToken:
          type: string
        lastChangelog:
          allOf:
            - $ref: "#/components/schemas/AccountChangelog"
          nullable: true
        sitespeedEnabled:
          type: boolean
        sitespeedUrls:
          type: array
          nullable: true
          items:
            type: string
        sitespeedDetailUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        extensions:
          type: array
          items:
            $ref: "#/components/schemas/ShopExtension"
        scheduledTasks:
          type: array
          items:
            $ref: "#/components/schemas/ScheduledTask"
        queues:
          type: array
          items:
            $ref: "#/components/schemas/Queue"
        cache:
          allOf:
            - $ref: "#/components/schemas/CacheInfo"
          nullable: true
        checks:
          type: array
          items:
            $ref: "#/components/schemas/ShopCheck"
        sitespeeds:
          type: array
          items:
            $ref: "#/components/schemas/Sitespeed"
        changelogs:
          type: array
          items:
            $ref: "#/components/schemas/AccountChangelog"
        deploymentsCount:
          type: integer

    ShopExtension:
      type: object
      required:
        - name
        - label
        - version
        - latestVersion
        - active
        - installed
      properties:
        name:
          type: string
        label:
          type: string
        version:
          type: string
        latestVersion:
          type: string
        active:
          type: boolean
        installed:
          type: boolean
        storeLink:
          type: string
          nullable: true
        ratingAverage:
          type: number
          nullable: true
        installedAt:
          type: string
          nullable: true
          format: date-time
        changelog:
          type: string
          nullable: true

    ScheduledTask:
      type: object
      required:
        - id
        - name
        - runInterval
        - status
        - overdue
      properties:
        id:
          type: string
        name:
          type: string
        runInterval:
          type: integer
        status:
          type: string
        lastExecutionTime:
          type: string
          nullable: true
          format: date-time
        nextExecutionTime:
          type: string
          nullable: true
          format: date-time
        overdue:
          type: boolean

    Queue:
      type: object
      required:
        - name
        - size
      properties:
        name:
          type: string
        size:
          type: integer

    CacheInfo:
      type: object
      properties:
        id:
          type: integer
        environment:
          type: string
        httpCache:
          type: boolean
        cacheAdapter:
          type: string

    ShopCheck:
      type: object
      required:
        - id
        - level
        - message
      properties:
        id:
          type: string
        level:
          type: string
        message:
          type: string
        link:
          type: string
          nullable: true

    Sitespeed:
      type: object
      required:
        - createdAt
      properties:
        ttfb:
          type: number
          nullable: true
        fullyLoaded:
          type: number
          nullable: true
        largestContentfulPaint:
          type: number
          nullable: true
        firstContentfulPaint:
          type: number
          nullable: true
        cumulativeLayoutShift:
          type: number
          nullable: true
        transferSize:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time
        deployment:
          allOf:
            - $ref: "#/components/schemas/SitespeedDeployment"
          nullable: true

    SitespeedDeployment:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
        name:
          type: string

    SitespeedSettingsRequest:
      type: object
      required:
        - enabled
      properties:
        enabled:
          type: boolean
        urls:
          type: array
          items:
            type: string
          maxItems: 5

    # ── Projects ─────────────────────────────────
    Project:
      type: object
      required:
        - id
        - name
        - description
        - gitUrl
        - organizationId
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        gitUrl:
          type: string
          nullable: true
        organizationId:
          type: string

    CreateProjectRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        gitUrl:
          type: string

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        gitUrl:
          type: string

    # ── API Keys ─────────────────────────────────
    ApiKeyScope:
      type: object
      required:
        - value
        - label
        - description
      properties:
        value:
          type: string
        label:
          type: string
        description:
          type: string

    ApiKey:
      type: object
      required:
        - id
        - name
        - scopes
        - createdAt
        - lastUsedAt
      properties:
        id:
          type: integer
        name:
          type: string
        scopes:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          nullable: true
          format: date-time

    CreateApiKeyRequest:
      type: object
      required:
        - name
        - scopes
      properties:
        name:
          type: string
        scopes:
          type: array
          items:
            type: string

    CreateApiKeyResponse:
      type: object
      required:
        - id
        - token
        - name
        - scopes
      properties:
        id:
          type: integer
        token:
          type: string
        name:
          type: string
        scopes:
          type: array
          items:
            type: string

    # ── Packages Token ───────────────────────────
    PackagesTokenConfiguration:
      type: object
      required:
        - configured
        - composerUrl
      properties:
        configured:
          type: boolean
        composerUrl:
          type: string
          nullable: true

    PackagesToken:
      type: object
      required:
        - id
        - source
        - lastSyncedAt
      properties:
        id:
          type: integer
        source:
          type: string
        lastSyncedAt:
          type: string
          nullable: true
          format: date-time

    CreatePackagesTokenRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string

    # ── Deployments ──────────────────────────────
    Deployment:
      type: object
      required:
        - id
        - name
        - command
        - returnCode
        - startDate
        - endDate
        - executionTime
        - reference
        - createdAt
      properties:
        id:
          type: integer
        name:
          type: string
          nullable: true
        command:
          type: string
        returnCode:
          type: integer
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        executionTime:
          type: number
          description: Execution time in seconds
        reference:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    DeploymentDetail:
      allOf:
        - $ref: "#/components/schemas/Deployment"
        - type: object
          properties:
            output:
              type: string
              nullable: true

    CreateCliDeploymentRequest:
      type: object
      required:
        - shop_id
        - command
        - return_code
        - start_date
        - end_date
        - execution_time
      properties:
        shop_id:
          type: integer
        command:
          type: string
        return_code:
          type: integer
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        execution_time:
          type: number
        composer:
          type: string
          nullable: true
        reference:
          type: string
          nullable: true
        name:
          type: string
          nullable: true

    CreateCliDeploymentResponse:
      type: object
      required:
        - success
        - name
        - deployment_id
        - url
        - upload_url
      properties:
        success:
          type: boolean
        name:
          type: string
        deployment_id:
          type: integer
        url:
          type: string
        upload_url:
          type: string

    # ── SSO ──────────────────────────────────────
    SsoProvider:
      type: object
      required:
        - id
        - domain
        - issuer
        - clientId
        - authorizationEndpoint
        - tokenEndpoint
        - jwksEndpoint
      properties:
        id:
          type: string
        domain:
          type: string
        issuer:
          type: string
        clientId:
          type: string
        authorizationEndpoint:
          type: string
        tokenEndpoint:
          type: string
        jwksEndpoint:
          type: string

    SsoDiscovery:
      type: object
      required:
        - issuer
        - authorizationEndpoint
        - tokenEndpoint
        - jwksEndpoint
        - userInfoEndpoint
        - scopes
      properties:
        issuer:
          type: string
        authorizationEndpoint:
          type: string
        tokenEndpoint:
          type: string
        jwksEndpoint:
          type: string
        userInfoEndpoint:
          type: string
        scopes:
          type: array
          items:
            type: string

    UpdateSsoProviderRequest:
      type: object
      required:
        - domain
        - issuer
        - clientId
        - authorizationEndpoint
        - tokenEndpoint
        - jwksEndpoint
      properties:
        domain:
          type: string
        issuer:
          type: string
        clientId:
          type: string
        clientSecret:
          type: string
        authorizationEndpoint:
          type: string
        tokenEndpoint:
          type: string
        jwksEndpoint:
          type: string

    # ── Admin ────────────────────────────────────
    AdminOrganizationsResponse:
      type: object
      required:
        - organizations
        - total
      properties:
        organizations:
          type: array
          items:
            $ref: "#/components/schemas/AccountOrganization"
        total:
          type: integer

    AdminShopsResponse:
      type: object
      required:
        - shops
        - total
      properties:
        shops:
          type: array
          items:
            $ref: "#/components/schemas/AccountShop"
        total:
          type: integer

    AdminStats:
      type: object
      required:
        - totalUsers
        - totalOrganizations
        - totalShops
        - shopsByStatus
      properties:
        totalUsers:
          type: integer
        totalOrganizations:
          type: integer
        totalShops:
          type: integer
        shopsByStatus:
          type: object
          required:
            - green
            - yellow
            - red
          properties:
            green:
              type: integer
            yellow:
              type: integer
            red:
              type: integer

    AdminGrowth:
      type: object
      required:
        - users
        - shops
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/GrowthDataPoint"
        shops:
          type: array
          items:
            $ref: "#/components/schemas/GrowthDataPoint"

    GrowthDataPoint:
      type: object
      required:
        - month
        - count
      properties:
        month:
          type: string
        count:
          type: integer

    AdminRecentActivity:
      type: object
      required:
        - recentUsers
        - recentShops
      properties:
        recentUsers:
          type: array
          items:
            $ref: "#/components/schemas/UserProfile"
        recentShops:
          type: array
          items:
            $ref: "#/components/schemas/AccountShop"

    ShopwareVersionCount:
      type: object
      required:
        - version
        - count
      properties:
        version:
          type: string
        count:
          type: integer

    # ── Info ─────────────────────────────────────
    ExtensionCompatibilityRequest:
      type: object
      required:
        - currentVersion
        - futureVersion
        - extensions
      properties:
        currentVersion:
          type: string
        futureVersion:
          type: string
        extensions:
          type: array
          items:
            type: object
            required:
              - name
              - version
            properties:
              name:
                type: string
              version:
                type: string

    ExtensionCompatibilityResult:
      type: object
      required:
        - name
        - label
        - iconPath
        - status
      properties:
        name:
          type: string
        label:
          type: string
        iconPath:
          type: string
          nullable: true
        status:
          type: object
          required:
            - name
            - label
            - type
          properties:
            name:
              type: string
            label:
              type: string
            type:
              type: string

    # ── Auth ────────────────────────────────────
    AuthUser:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        emailVerified:
          type: boolean
        image:
          type: string
          nullable: true
        role:
          type: string
        notifications:
          type: array
          items:
            type: string

    SessionInfo:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        expiresAt:
          type: string
          format: date-time
        activeOrganizationId:
          type: string
          nullable: true
